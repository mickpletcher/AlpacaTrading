name: CI

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:

jobs:
  python-quality:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python packages
        shell: pwsh
        run: |
          python -m compileall Alpaca Backtesting Journal rsi_macd_bot btc-signal-executor

      - name: Run pytest
        shell: pwsh
        run: |
          python -m pytest .\Tests -q

  powershell-quality:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -SkipPublisherCheck -Scope CurrentUser
          Install-Module Pester -Force -SkipPublisherCheck -Scope CurrentUser -MinimumVersion 5.5.0

      - name: Validate module manifests
        shell: pwsh
        run: |
          $repoSrc = (Resolve-Path .\src).Path
          $env:PSModulePath = "$repoSrc$([IO.Path]::PathSeparator)$env:PSModulePath"
          $manifests = Get-ChildItem .\src -Recurse -Filter *.psd1 -File
          foreach ($manifest in $manifests) {
            Test-ModuleManifest -Path $manifest.FullName | Out-Null
          }

      - name: Import PowerShell modules
        shell: pwsh
        run: |
          $repoSrc = (Resolve-Path .\src).Path
          $env:PSModulePath = "$repoSrc$([IO.Path]::PathSeparator)$env:PSModulePath"
          $moduleNames = Get-ChildItem .\src -Directory | Select-Object -ExpandProperty Name
          foreach ($moduleName in $moduleNames) {
            Import-Module $moduleName -Force
          }

      - name: Run script analyzer
        shell: pwsh
        run: |
          Import-Module PSScriptAnalyzer
          $files = Get-ChildItem .\src,.\Alpaca,.\Backtesting,.\Scheduler,.\examples -Recurse -Include *.ps1,*.psm1 -File | Select-Object -ExpandProperty FullName
          if (-not $files) {
            throw 'No PowerShell files found for analysis.'
          }
          $results = @()
          foreach ($file in $files) {
            $results += Invoke-ScriptAnalyzer -Path $file -Settings .\PSScriptAnalyzerSettings.psd1
          }
          $blockingResults = $results | Where-Object { $_.Severity -in @('Error', 'ParseError') }
          if ($blockingResults) {
            $blockingResults | Format-Table RuleName, Severity, ScriptName, Line -AutoSize
            throw 'PSScriptAnalyzer reported issues.'
          }

      - name: Run Pester
        shell: pwsh
        run: |
          $repoSrc = (Resolve-Path .\src).Path
          $env:PSModulePath = "$repoSrc$([IO.Path]::PathSeparator)$env:PSModulePath"
          Import-Module Pester -MinimumVersion 5.5.0 -Force
          Invoke-Pester -Path .\Tests -CI
